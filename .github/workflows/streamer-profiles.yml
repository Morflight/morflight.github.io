name: Update Streamer Profiles

on:
  push:
    branches: [master]
  schedule:
    # Runs once a day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Twitch app token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d "client_id=${{ secrets.TWITCH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TWITCH_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch profile pictures
        env:
          TWITCH_TOKEN: ${{ steps.token.outputs.token }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
        run: |
          # ----------------------------------------------------------------
          # List every Twitch login from streamers.html here (lowercase).
          # ----------------------------------------------------------------
          LOGINS="qkobyy flyzer_s silowa djaem_ nevrozzar_ maisnonfps mdl_labastos"

          QUERY=$(echo "$LOGINS" | tr ' ' '\n' | sed 's/^/login=/' | paste -sd '&')

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $TWITCH_TOKEN" \
            -H "Client-Id: $TWITCH_CLIENT_ID" \
            "https://api.twitch.tv/helix/users?$QUERY")

          echo "$RESPONSE" | jq '[(.data // [])[] | {(.login): .profile_image_url}] | add // {}' > streamer-profiles.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streamer-profiles.json
          git diff --cached --quiet || git commit -m "chore: update streamer profiles [skip ci]"
          git push
